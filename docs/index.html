<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>캘리버로 전자책 만들기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --base-font-size: 16px;
      --base-line-height: 1.8;
      --theme-color: #E67E22;
      --sidebar-width: 260px;
      --sidebar-nav-link-color--active: #E67E22;
      --sidebar-nav-link-border-color--active: #E67E22;
      --heading-color: #2C3E50;
    }
    .markdown-section h1 { border-bottom: 2px solid #E67E22; padding-bottom: 0.3em; }
    .markdown-section h2 { color: #2C3E50; margin-top: 2em; }
    .markdown-section h3 { color: #E67E22; }
    .markdown-section img {
      max-width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin: 1em 0;
    }
    .markdown-section table { border-collapse: collapse; width: 100%; }
    .markdown-section th { background: #2C3E50; color: white; padding: 10px 14px; }
    .markdown-section td { padding: 8px 14px; border: 1px solid #ddd; }
    .markdown-section tr:nth-child(even) { background: #f8f9fa; }
    .tip-box {
      background: #FFF3E0;
      border-left: 4px solid #E67E22;
      padding: 12px 16px;
      margin: 1em 0;
      border-radius: 0 8px 8px 0;
    }
    .warning-box {
      background: #FFF8E1;
      border-left: 4px solid #FF9800;
      padding: 12px 16px;
      margin: 1em 0;
      border-radius: 0 8px 8px 0;
    }
    .success-box {
      background: #E8F5E9;
      border-left: 4px solid #4CAF50;
      padding: 12px 16px;
      margin: 1em 0;
      border-radius: 0 8px 8px 0;
    }
    .step-number {
      display: inline-block;
      background: #E67E22;
      color: white;
      width: 32px; height: 32px;
      border-radius: 50%;
      text-align: center;
      line-height: 32px;
      font-weight: bold;
      margin-right: 8px;
    }
    /* 체크리스트 스타일 */
    .markdown-section ul li { list-style: none; margin-left: -1em; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '캘리버로 전자책 만들기',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '검색...',
        noData: '결과 없음',
      },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
